<ppt-deck size="wide">
  <ppt-slide style="background:#f7f4ee">
    <ppt-text style="left:80px;top:70px;width:980px;height:84px;font-family:Arial;font-size:44px;font-weight:700;color:#171717">
      {{deck.title}}
    </ppt-text>
    <ppt-text style="left:84px;top:164px;width:780px;height:68px;font-family:Arial;font-size:24px;color:#4b4b4b;line-height:1.3">
      {{deck.subtitle}}
    </ppt-text>
    <ppt-group style="left:86px;top:292px;width:520px;height:210px">
      <ppt-shape kind="roundRect" style="left:0px;top:0px;width:520px;height:210px;background:#ffffff;border:1px solid #d9d2c6"></ppt-shape>
      <ppt-text style="left:32px;top:26px;width:440px;height:50px;font-family:Arial;font-size:26px;font-weight:700;color:#232323">
        {{card.heading}}
      </ppt-text>
      <ppt-list style="left:42px;top:92px;width:410px;height:92px;font-family:Arial;font-size:21px;color:#4b4b4b;line-height:1.25;padding-left:24px">
        <ppt-li>{{card.first}}</ppt-li>
        <ppt-li>{{card.second}}</ppt-li>
      </ppt-list>
    </ppt-group>
  </ppt-slide>
</ppt-deck>
